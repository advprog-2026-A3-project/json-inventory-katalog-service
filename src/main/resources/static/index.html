<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JSON - Inventory Katalog</title>
  <style>
    body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
    .container { max-width: 800px; margin: auto; }
    form { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    input, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; }
    button { cursor: pointer; padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background-color: #f8f9fa; }
    .delete-btn { background: #dc3545; }
  </style>
</head>
<body>
<div class="container">
  <h2>Tambah Barang Jastip</h2>
  <form id="productForm">
    <label>Nama Barang:</label>
    <input type="text" id="nama" required>

    <label>Harga (IDR):</label>
    <input type="number" id="harga" required>

    <label>Stok:</label>
    <input type="number" id="stok" required>

    <label>Negara Asal:</label>
    <input type="text" id="negaraAsal" required>

    <label>Deskripsi:</label>
    <textarea id="deskripsi" required></textarea>

    <label>Jastiper ID:</label>
    <input type="text" id="jastiperId" value="jastiper-001" required>

    <button type="submit">Simpan ke Katalog</button>
  </form>

  <h2>Daftar Katalog</h2>
  <table id="productTable">
    <thead>
    <tr>
      <th>Nama</th>
      <th>Deskripsi</th>
      <th>Harga</th>
      <th>Stok</th>
      <th>Asal</th>
      <th>Aksi</th>
    </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  const API_URL = '/api/products';

  // Munculkan data saat page load
  document.addEventListener('DOMContentLoaded', fetchProducts);

  // Fungsi ambil data
  async function fetchProducts() {
    const response = await fetch(API_URL);
    const products = await response.json();
    const tbody = document.querySelector('#productTable tbody');
    tbody.innerHTML = '';
    products.forEach(p => {
      tbody.innerHTML += `
                <tr>
                    <td>${p.nama}</td>
                    <td>${p.deskripsi || '-'}</td>
                    <td>Rp ${p.harga.toLocaleString()}</td>
                    <td>${p.stok}</td>
                    <td>${p.negaraAsal}</td>
                    <td><button class="delete-btn" onclick="deleteProduct('${p.id}')">Hapus</button></td>
                </tr>
            `;
    });
  }

  // Fungsi tambah data
  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      nama: document.getElementById('nama').value,
      harga: parseFloat(document.getElementById('harga').value),
      stok: parseInt(document.getElementById('stok').value),
      negaraAsal: document.getElementById('negaraAsal').value,
      jastiperId: document.getElementById('jastiperId').value,
      deskripsi: document.getElementById('deskripsi').value
    };

    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    e.target.reset();
    fetchProducts();
  });

  // Fungsi hapus data
  async function deleteProduct(id) {
    if(confirm('Yakin hapus?')) {
      await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      fetchProducts();
    }
  }
</script>
</body>
</html>
