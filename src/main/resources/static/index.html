<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Katalog Jastip</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Katalog Barang Jastip</h2>
    <a href="tambah_barang.html" class="btn btn-success">+ Tambah Barang</a>
  </div>

  <div class="card p-3 mb-4 shadow-sm">
    <div class="row g-2">
      <div class="col-md-5">
        <input type="text" id="searchNama" class="form-control" placeholder="Cari nama barang...">
      </div>
      <div class="col-md-5">
        <input type="text" id="searchJastiper" class="form-control" placeholder="Cari ID Jastiper...">
      </div>
      <div class="col-md-2 d-flex gap-2">
        <button class="btn btn-primary w-100" onclick="searchProducts()">Cari</button>
        <button class="btn btn-secondary w-100" onclick="fetchProducts()">Reset</button>
      </div>
    </div>
  </div>

  <div class="row" id="katalogGrid">
  </div>
</div>

<script>
  const API_URL = '/api/products';

  document.addEventListener('DOMContentLoaded', fetchProducts);

  function renderCards(products) {
    const grid = document.getElementById('katalogGrid');
    grid.innerHTML = '';

    if(products.length === 0) {
      grid.innerHTML = '<div class="col-12"><p class="text-center text-muted">Tidak ada barang ditemukan.</p></div>';
      return;
    }

    products.forEach(p => {
      const thumbnail = (p.imageUrls && p.imageUrls.length > 0) ? p.imageUrls[0] : 'https://via.placeholder.com/300x200?text=No+Image';

      grid.innerHTML += `
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm">
            <img src="${thumbnail}" class="card-img-top" style="height: 200px; object-fit: cover;">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${p.nama}</h5>
              <h6 class="text-primary">Rp ${p.harga.toLocaleString()}</h6>
              <div class="mt-auto d-grid gap-2">
                <a href="detail_barang.html?id=${p.id}" class="btn btn-outline-primary">Lihat Detail</a>
                <a href="edit_barang.html?id=${p.id}" class="btn btn-warning btn-sm">Edit Barang</a>
              </div>
            </div>
          </div>
        </div>
      `;
    });
  }

  async function fetchProducts() {
    document.getElementById('searchNama').value = '';
    document.getElementById('searchJastiper').value = '';
    const res = await fetch(API_URL);
    const products = await res.json();
    renderCards(products);
  }

  async function searchProducts() {
    const nama = document.getElementById('searchNama').value;
    const jastiper = document.getElementById('searchJastiper').value;

    let url = API_URL;
    if (nama) url = `${API_URL}/search/nama?nama=${nama}`;
    else if (jastiper) url = `${API_URL}/search/jastiper?jastiperId=${jastiper}`;

    const res = await fetch(url);
    const products = await res.json();
    renderCards(products);
  }
</script>
</body>
</html>
