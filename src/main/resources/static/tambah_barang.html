<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tambah Barang - Katalog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
  <div class="card shadow">
    <div class="card-header bg-success text-white">
      <h4 class="mb-0">Tambah Barang Baru</h4>
    </div>
    <div class="card-body">
      <form id="productForm">
        <div class="mb-3">
          <label class="form-label">Nama Barang</label>
          <input type="text" id="nama" class="form-control" required>
        </div>
        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Harga (Rp)</label>
            <input type="number" id="harga" class="form-control" required>
          </div>
          <div class="col">
            <label class="form-label">Stok</label>
            <input type="number" id="stok" class="form-control" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Negara Asal</label>
          <input type="text" id="negaraAsal" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">ID Jastiper</label>
          <input type="text" id="jastiperId" class="form-control" value="jastiper-001" required>
        </div>
        <div class="mb-3">
          <label class="form-label">URL Gambar (Pisahkan dengan koma jika lebih dari 1)</label>
          <textarea id="imageUrls" class="form-control" placeholder="https://web.com/img1.jpg, https://web.com/img2.jpg"></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label">Deskripsi</label>
          <textarea id="deskripsi" class="form-control" rows="3" required></textarea>
        </div>
        <div class="d-flex justify-content-between">
          <a href="index.html" class="btn btn-secondary">Batal</a>
          <button type="submit" class="btn btn-success">Simpan Barang</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const imgString = document.getElementById('imageUrls').value;
    const imgArray = imgString ? imgString.split(',').map(s => s.trim()).filter(s => s !== '') : [];

    const data = {
      nama: document.getElementById('nama').value,
      harga: parseFloat(document.getElementById('harga').value),
      stok: parseInt(document.getElementById('stok').value),
      negaraAsal: document.getElementById('negaraAsal').value,
      jastiperId: document.getElementById('jastiperId').value,
      deskripsi: document.getElementById('deskripsi').value,
      imageUrls: imgArray
    };

    const response = await fetch('/api/products', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if(response.ok) {
      alert("Barang berhasil ditambahkan!");
      window.location.href = 'index.html'; // Redirect kembali ke katalog
    } else {
      alert("Gagal menambahkan barang.");
    }
  });
</script>
</body>
</html>
