name: CD (Guarded by CI)

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types: [completed]

jobs:
  deploy:
    name: Test and Deploy to Heroku
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'staging'
        )
      }}
    runs-on: ubuntu-22.04
    environment:
      name: production
      url: https://katalog-jastip-d36df74f28ff.herokuapp.com/

    steps:
      - name: Checkout the same commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: false
          dontautocreate: true

      - name: Verify home page
        env:
          APP_URL: https://katalog-jastip-d36df74f28ff.herokuapp.com/
        run: |
          for i in {1..18}; do
            response=$(curl -sSL --max-time 20 -w $'\n__STATUS__:%{http_code}' "$APP_URL/" || true)
            body=$(echo "$response" | sed '$d')
            status=$(echo "$response" | tail -n1 | sed 's/__STATUS__://')

            if [ "$status" = "200" ] \
              && echo "$body" | grep -qi "Welcome" \
              && echo "$body" | grep -qi "View Products"; then
              echo "Home page passed."
              exit 0
            fi

            echo "Attempt $i failed: status=$status. Waiting..."
            sleep 10
          done

          echo "Home page verification failed."
          exit 1

      - name: Publish deploy link
        run: |
          echo "### Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "https://katalog-jastip-d36df74f28ff.herokuapp.com/" >> $GITHUB_STEP_SUMMARY